# /etc/nginx/sites-available/edusync
# Run: sudo ln -s /etc/nginx/sites-available/edusync /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;   # replace with your domain or EC2 public IP

    # ── Frontend (HTML/CSS/JS) ──────────────────────
    root /var/www/html/edusync;
    index login.html;

    location / {
        try_files $uri $uri/ /login.html;
    }

    # ── Backend API proxy ───────────────────────────
    # All /api/* requests forwarded to Node.js on port 4000
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade      $http_upgrade;
        proxy_set_header   Connection   'upgrade';
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:4000/health;
    }

    # ── Security headers ────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";

    # ── Gzip compression ────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;

    # ── Static file caching ─────────────────────────
    location ~* \.(css|js|html|ico|png|jpg)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Block hidden files ──────────────────────────
    location ~ /\. {
        deny all;
    }
}
