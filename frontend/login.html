<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSync — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0D1B2A;
    --navy2: #1B2B3B;
    --gold: #C9A84C;
    --gold2: #E8C97A;
    --teal: #1A8A72;
    --coral: #C94C4C;
    --text: #F0EDE8;
    --muted: rgba(240,237,232,0.5);
    --border: rgba(240,237,232,0.12);
    --card: rgba(255,255,255,0.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body {
    font-family:'DM Sans',sans-serif;
    background:var(--navy);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }
  body::before {
    content:'';
    position:fixed;inset:0;
    background: radial-gradient(ellipse 80% 60% at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 50%, rgba(26,138,114,0.06) 0%, transparent 60%);
    pointer-events:none;
  }
  .grid-bg {
    position:fixed;inset:0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px),
                      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events:none;
    opacity:0.4;
  }
  .container {
    width:100%;max-width:440px;padding:24px;
    position:relative;z-index:10;
  }
  .logo-area {
    text-align:center;margin-bottom:40px;
    animation: fadeDown 0.6s ease both;
  }
  .logo-icon {
    width:56px;height:56px;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;margin:0 auto 16px;
    box-shadow:0 8px 32px rgba(201,168,76,0.3);
  }
  h1 {
    font-family:'Playfair Display',serif;
    color:var(--text);font-size:28px;font-weight:700;
    letter-spacing:-0.02em;margin-bottom:6px;
  }
  .subtitle { color:var(--muted);font-size:14px;font-weight:300;letter-spacing:0.02em; }

  .card {
    background:var(--card);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);
    border-radius:20px;padding:36px;
    animation:fadeUp 0.6s 0.1s ease both;
  }
  .role-tabs {
    display:flex;gap:6px;
    background:rgba(255,255,255,0.04);
    border-radius:12px;padding:4px;
    margin-bottom:28px;
  }
  .role-tab {
    flex:1;padding:10px;border:none;border-radius:9px;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
    background:transparent;color:var(--muted);
    transition:all 0.2s;
  }
  .role-tab.active {
    background:var(--gold);color:var(--navy);font-weight:600;
    box-shadow:0 2px 12px rgba(201,168,76,0.3);
  }
  .form-group { margin-bottom:20px; }
  label {
    display:block;font-size:11px;font-weight:600;
    color:var(--muted);letter-spacing:0.1em;
    text-transform:uppercase;margin-bottom:8px;
  }
  input {
    width:100%;padding:13px 16px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
    transition:all 0.2s;outline:none;
  }
  input:focus { border-color:rgba(201,168,76,0.5);background:rgba(255,255,255,0.07); }
  input::placeholder { color:var(--muted); }
  .btn-primary {
    width:100%;padding:14px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:var(--navy);font-family:'DM Sans',sans-serif;
    font-size:15px;font-weight:600;letter-spacing:0.02em;
    transition:all 0.2s;margin-top:8px;
    box-shadow:0 4px 20px rgba(201,168,76,0.25);
  }
  .btn-primary:hover { transform:translateY(-1px);box-shadow:0 8px 28px rgba(201,168,76,0.35); }
  .btn-primary:active { transform:translateY(0); }
  .btn-primary:disabled { opacity:0.6;cursor:not-allowed;transform:none; }
  .error-msg {
    background:rgba(201,76,76,0.12);border:1px solid rgba(201,76,76,0.3);
    color:#f08080;border-radius:8px;padding:10px 14px;
    font-size:13px;margin-bottom:16px;display:none;
  }
  .divider {
    display:flex;align-items:center;gap:12px;margin:20px 0;
  }
  .divider::before,.divider::after {
    content:'';flex:1;height:1px;background:var(--border);
  }
  .divider span { color:var(--muted);font-size:12px; }
  .link-btn {
    background:none;border:none;color:var(--gold2);cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:14px;
    text-decoration:underline;text-underline-offset:3px;
  }
  .signup-form { display:none; }
  .back-btn {
    background:none;border:1px solid var(--border);
    color:var(--muted);border-radius:8px;padding:8px 16px;
    cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;
    margin-bottom:20px;transition:all 0.2s;
  }
  .back-btn:hover { border-color:var(--gold);color:var(--gold); }
  select {
    width:100%;padding:13px 16px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
    outline:none;appearance:none;cursor:pointer;
  }
  select option { background:var(--navy2);color:var(--text); }
  .success-msg {
    text-align:center;padding:20px 0;
    color:var(--teal);font-size:15px;display:none;
  }
  .footer-note {
    text-align:center;margin-top:24px;
    color:var(--muted);font-size:12px;
    animation:fadeUp 0.6s 0.2s ease both;
  }
  @keyframes fadeDown {
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
  }
  .spinner {
    width:16px;height:16px;border:2px solid transparent;
    border-top-color:var(--navy);border-radius:50%;
    animation:spin 0.8s linear infinite;display:inline-block;margin-right:8px;vertical-align:middle;
  }
  @keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">
  <div class="logo-area">
    <div class="logo-icon">🎓</div>
    <h1>EduSync</h1>
    <p class="subtitle">College Management System</p>
  </div>

  <div class="card">
    <!-- Login Form -->
    <div id="loginForm">
      <div class="role-tabs">
        <button class="role-tab active" onclick="setRole('student',this)">Student</button>
        <button class="role-tab" onclick="setRole('faculty',this)">Faculty</button>
        <button class="role-tab" onclick="setRole('admin',this)">Admin</button>
      </div>
      <div class="error-msg" id="loginError"></div>
      <div class="form-group">
        <label id="idLabel">Student ID</label>
        <input type="text" id="username" placeholder="e.g. CS2101" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>
      <div class="divider"><span>new student?</span></div>
      <div style="text-align:center;">
        <button class="link-btn" onclick="showSignup()">Create account</button>
      </div>
    </div>

    <!-- Signup Form -->
    <div class="signup-form" id="signupForm">
      <button class="back-btn" onclick="showLogin()">← Back to login</button>
      <div class="error-msg" id="signupError"></div>
      <div class="success-msg" id="signupSuccess">✓ Account created! Redirecting to login…</div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Student ID</label>
        <input type="text" id="regUsername" placeholder="e.g. CS2101">
      </div>
      <div class="form-group">
        <label>Department</label>
        <select id="regDept">
          <option value="">Select department</option>
          <option>Computer Science</option>
          <option>Electronics</option>
          <option>Mechanical</option>
          <option>Civil</option>
        </select>
      </div>
      <div class="form-group">
        <label>Year</label>
        <select id="regYear">
          <option value="">Select year</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min 6 characters">
      </div>
      <button class="btn-primary" id="signupBtn" onclick="doSignup()">Create Account →</button>
    </div>
  </div>

  <p class="footer-note">🔒 Secured · Jenkins CI/CD · AWS RDS</p>
</div>

<script>
  const API = 'http://localhost:4000/api';
  let currentRole = 'student';

  function setRole(role, el) {
    currentRole = role;
    document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const labels = { student:'Student ID', faculty:'Faculty ID', admin:'Admin ID' };
    document.getElementById('idLabel').textContent = labels[role];
  }

  function showSignup() {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'block';
  }
  function showLogin() {
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('loginError');
    const btn      = document.getElementById('loginBtn');
    errEl.style.display = 'none';

    if (!username || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, password, role: currentRole })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('token', data.token);
      localStorage.setItem('role',  data.role);
      localStorage.setItem('username', data.username);
      localStorage.setItem('userId', data.userId);

      window.location.href = 'dashboard.html';
    } catch(e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
    }
  }

  async function doSignup() {
    const name     = document.getElementById('regName').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const dept     = document.getElementById('regDept').value;
    const year     = document.getElementById('regYear').value;
    const password = document.getElementById('regPassword').value;
    const errEl    = document.getElementById('signupError');
    const btn      = document.getElementById('signupBtn');
    errEl.style.display = 'none';

    if (!name||!username||!dept||!year||!password) {
      errEl.textContent='Please fill in all fields.';errEl.style.display='block';return;
    }
    if (password.length < 6) {
      errEl.textContent='Password must be at least 6 characters.';errEl.style.display='block';return;
    }

    btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Creating…';

    try {
      const res = await fetch(`${API}/auth/register`, {
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password,role:'student',name,department:dept,year:parseInt(year)})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error||'Registration failed');

      document.getElementById('signupSuccess').style.display='block';
      btn.style.display='none';
      setTimeout(showLogin, 2000);
    } catch(e) {
      errEl.textContent=e.message;errEl.style.display='block';
    } finally {
      btn.disabled=false;btn.innerHTML='Create Account →';
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key==='Enter') {
      if (document.getElementById('loginForm').style.display !== 'none') doLogin();
      else doSignup();
    }
  });

  // Redirect if already logged in
  if (localStorage.getItem('token')) window.location.href='dashboard.html';
</script>
</body>
</html>
